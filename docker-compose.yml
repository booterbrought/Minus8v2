services:
  game-server:
    build:
      context: .
      dockerfile: DOCKERFILE
    container_name: minus8-game-server
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./data:/app/backend/db/data